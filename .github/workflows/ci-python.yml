name: CI - Python

on:
  push:
    branches: ["master"]
    paths:
      - "app.py"
      - "requirements.txt"
      - "run_tests.py"
      - "tests/**"
      - "worker/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "app.py"
      - "requirements.txt"
      - "run_tests.py"
      - "tests/**"
      - "worker/**"
      - ".github/workflows/ci-python.yml"

jobs:
  test:
    name: Run worker tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run test suite
        env:
          PYTHONPATH: .
        run: pytest tests
